<!DOCTYPE html>
<html>
<head>
    <title>Nhận diện Ngôn ngữ Ký hiệu</title>
    <meta charset="utf-8">
    <!-- Thư viện kết nối mạng SocketIO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        #resultImage { border: 3px solid #007bff; border-radius: 10px; max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>🧠 Web AI Dịch Ngôn ngữ Ký hiệu</h1>
    <p>Hãy cho phép trình duyệt sử dụng Camera và đưa tay lên nhé!</p>

    <!-- Camera thực tế sẽ bị giấu đi, chỉ dùng để lấy hình -->
    <video id="videoElement" autoplay playsinline style="display:none;"></video>
    <canvas id="canvasElement" style="display:none;"></canvas>
    
    <!-- Đây là khung ảnh sẽ hiển thị kết quả từ AI trả về -->
    <img id="resultImage" width="640" height="480" src="https://via.placeholder.com/640x480?text=Dang+nap+Camera..." />

    <script>
        var socket = io();

        var video = document.getElementById('videoElement');
        var canvas = document.getElementById('canvasElement');
        var context = canvas.getContext('2d');
        var resultImage = document.getElementById('resultImage');

        // Bật Camera trên máy của người dùng
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                video.srcObject = stream;
            })
            .catch(function(err) {
                alert("Lỗi: Không thể mở Camera. Vui lòng kiểm tra quyền truy cập!");
            });

        // Liên tục chụp ảnh và gửi lên máy chủ
        const FPS = 1; // Đặt 10 hình/giây để máy chủ Free không bị quá tải
        setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                // Vẽ khung hình từ video lên canvas
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                // Nén ảnh ra base64 (chất lượng 0.5 để truyền cho nhanh)
                var data = canvas.toDataURL('image/jpeg', 0.5); 
                // Gửi lên hàm handle_image trong app.py
                socket.emit('image', data); 
            }
        }, 1000 / FPS);

        // Lắng nghe kết quả từ máy chủ trả về và dán lên màn hình
        socket.on('response_back', function(image) {
            resultImage.src = image;
        });
    </script>
</body>
</html>
